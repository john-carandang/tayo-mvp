kind = "web"
previewPath = "/"
title = "Tayo — Life Coaching Platform"
version = "1.0.0"
id = "artifacts/tayo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20204

[services.development]
run = "pnpm --filter @workspace/tayo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tayo", "run", "build" ]
publicDir = "artifacts/tayo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20204"
BASE_PATH = "/"
